<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; user-select: none; }

        /* Лоадер */
        #loader-screen { position: fixed; inset: 0; background: rgba(20,20,25,0.4); backdrop-filter: blur(4px); z-index: 999999; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .loader-box { background: rgba(10,10,15,0.85); padding: 30px; border-radius: 16px; border: 1px solid rgba(0,255,204,0.3); box-shadow: 0 10px 40px rgba(0,0,0,0.8); text-align: center; color: #fff; font-family: sans-serif; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(0,255,204,0.2); border-top-color: #00ffcc; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .am-wrap {
            position: relative;
            width: 100%; height: 100%;
            min-height: 600px;
            background-size: cover;
            background-position: center;
            overflow: hidden;
            /* Отступы чтобы свечение не обрезалось */
            padding: 12px 12px 0 12px;
        }

        /* ======= HUD ======= */
        .am-hud {
            position: absolute;
            top: 18px; left: 18px; right: 18px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 10;
        }
        .am-hud-left { display: flex; align-items: center; gap: 12px; }
        .am-hud-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }

        .am-hud-icon { width: 50px; height: 50px; object-fit: contain; filter: drop-shadow(0 0 8px rgba(255,255,255,0.8)); animation: iconPulse 2s infinite; }
        @keyframes iconPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.15); filter: drop-shadow(0 0 15px #fff); } }

        /* --- Красивый прогресс-бар --- */
        .am-prog-wrap { display: flex; flex-direction: column; gap: 4px; }
        .am-prog-label { font-size: 11px; font-weight: 700; color: #fff; text-transform: uppercase; letter-spacing: 1px; text-shadow: 0 0 6px #000; }
        .am-prog-bg {
            width: 260px; height: 22px;
            background: rgba(0,0,0,0.55);
            border: 2px solid #fff;
            border-radius: 30px;
            overflow: hidden;
            box-shadow: 0 0 12px rgba(0,0,0,0.6), inset 0 2px 4px rgba(0,0,0,0.4);
            position: relative;
        }
        .am-prog-fill {
            height: 100%;
            width: 0%;
            border-radius: 30px;
            transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        .am-prog-fill::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(180deg, rgba(255,255,255,0.35) 0%, transparent 60%);
            border-radius: 30px;
        }
        .am-prog-fill::after {
            content: '';
            position: absolute;
            top: 0; left: -100%; width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.7), transparent);
            animation: shine 1.8s infinite;
        }
        @keyframes shine { to { left: 200%; } }

        /* Звёздочки прогресса */
        .am-prog-stars { display: flex; gap: 5px; }
        .am-prog-star { font-size: 18px; opacity: 0.3; transition: opacity 0.3s, transform 0.3s; }
        .am-prog-star.lit { opacity: 1; transform: scale(1.3); filter: drop-shadow(0 0 5px gold); }

        /* --- Счёт --- */
        .am-score-wrap {
            background: rgba(0,0,0,0.55);
            border: 2px solid #fff;
            border-radius: 30px;
            padding: 4px 16px;
            font-size: 20px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 8px #000;
            letter-spacing: 1px;
            box-shadow: 0 0 12px rgba(0,0,0,0.5);
            white-space: nowrap;
        }
        .am-score-wrap span { font-size: 13px; font-weight: 400; opacity: 0.7; }

        /* --- Комбо --- */
        .am-combo-float {
            position: absolute;
            pointer-events: none;
            font-weight: 900;
            font-size: 42px;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 20px currentColor;
            opacity: 0;
            z-index: 100;
            will-change: transform, opacity;
        }
        @keyframes comboPop {
            0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.4); }
            15%  { opacity: 1; transform: translate(-50%,-50%) scale(1.3); }
            40%  { opacity: 1; transform: translate(-50%,-50%) scale(1.0); }
            70%  { opacity: 1; transform: translate(-50%,-100%); }
            100% { opacity: 0; transform: translate(-50%,-160%); }
        }

        /* Постоянное мини-комбо в HUD */
        .am-combo-hud {
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            color: #fff;
            text-shadow: 0 0 10px #000;
            opacity: 0;
            transition: opacity 0.3s;
            background: rgba(0,0,0,0.45);
            border-radius: 20px;
            padding: 3px 12px;
            border: 2px solid rgba(255,255,255,0.3);
        }
        .am-combo-hud.active { opacity: 1; animation: comboHudPulse 1.2s infinite; }
        @keyframes comboHudPulse {
            0%,100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        /* ======= Элементы ======= */
        .am-item { position: absolute; width: 80px; height: 80px; cursor: pointer; transform: translate(-50%,-50%); transition: transform 0.2s; z-index: 5; }
        .am-item:hover { transform: translate(-50%,-50%) scale(1.2); filter: brightness(1.2); }
        .am-char { position: absolute; width: 200px; height: 200px; top: 50%; left: 10%; transform: translate(-50%,-50%); z-index: 15; pointer-events: none; }

        /* ======= Оверлей / Модалка ======= */
        .am-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.82); display: flex; justify-content: center; align-items: center; opacity: 0; pointer-events: none; transition: opacity 0.35s; z-index: 20; backdrop-filter: blur(5px); }
        .am-overlay.active { opacity: 1; pointer-events: auto; }
        .am-modal { border: 4px solid #fff; padding: 36px 46px; text-align: center; position: relative; min-width: 480px; max-width: 90%; display: flex; flex-direction: column; align-items: center; gap: 18px; box-shadow: 0 10px 40px rgba(0,0,0,0.8); border-radius: 16px; }
        .am-modal.shake { animation: shake 0.4s ease-in-out; border-color: #ff3333 !important; box-shadow: 0 0 30px rgba(255,0,0,0.8) !important; }
        @keyframes shake { 0%,100% { transform: translateX(0); } 20%,60% { transform: translateX(-10px); } 40%,80% { transform: translateX(10px); } }

        .am-title { font-size: 26px; font-weight: bold; margin: 0; line-height: 1.4; }
        .am-input { width: 100%; padding: 14px; font-size: 22px; text-align: center; font-weight: bold; background: #000; border: 2px solid #fff; color: #fff; outline: none; border-radius: 8px; }
        .blank-input { width: 160px; display: inline-block; margin: 0 8px; padding: 6px 10px; border-radius: 6px; border-width: 2px; font-size: 20px; font-weight: bold; background: rgba(0,0,0,0.7); color: #fff; outline: none; }
        .am-btn { width: 100%; padding: 14px; font-size: 19px; font-weight: bold; background: #000; color: #fff; border: 2px solid #fff; cursor: pointer; transition: 0.2s; text-transform: uppercase; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .am-btn:hover { filter: brightness(1.3); transform: translateY(-2px); }
        .am-hint { font-size: 17px; min-height: 22px; margin: 0; font-weight: bold; text-shadow: 0 0 5px #000; }

        .wo-pool { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; min-height: 50px; }
        .wo-ans { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; min-height: 60px; border: 2px dashed rgba(255,255,255,0.5); padding: 15px; width: 100%; border-radius: 8px; background: rgba(0,0,0,0.3); }
        .wo-chip { background: #333; border: 2px solid #fff; padding: 10px 15px; border-radius: 8px; cursor: pointer; font-size: 19px; font-weight: bold; color: #fff; transition: 0.2s; box-shadow: 0 4px 10px rgba(0,0,0,0.5); }
        .wo-chip:hover { transform: scale(1.05); filter: brightness(1.2); }

        /* ======= Экран победы / статистика ======= */
        #am-vic-overlay .am-modal { gap: 14px; }
        .vic-title { font-size: 46px; font-weight: 900; text-transform: uppercase; margin: 0; line-height: 1.1; }
        .vic-score-big { font-size: 38px; font-weight: 900; }
        .vic-stars { font-size: 36px; letter-spacing: 4px; margin: 4px 0; }

        .vic-stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            width: 100%;
        }
        .vic-stat-box {
            background: rgba(0,0,0,0.4);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            padding: 10px 14px;
            text-align: center;
        }
        .vic-stat-val { font-size: 26px; font-weight: 900; }
        .vic-stat-lbl { font-size: 12px; opacity: 0.7; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }

        .vic-pass {
            background: #000;
            padding: 12px 28px;
            border: 2px dashed #fff;
            font-family: monospace;
            font-size: 26px;
            border-radius: 10px;
            width: 100%;
            text-align: center;
        }

        /* Кнопка "Попробовать снова" */
        .vic-retry-btn {
            width: 100%;
            padding: 14px;
            font-size: 20px;
            font-weight: bold;
            background: linear-gradient(135deg, #1a1a1a, #333);
            color: #fff;
            border: 3px solid #fff;
            cursor: pointer;
            text-transform: uppercase;
            border-radius: 10px;
            transition: 0.2s;
            box-shadow: 0 6px 20px rgba(0,0,0,0.6);
            letter-spacing: 1px;
        }
        .vic-retry-btn:hover { filter: brightness(1.4); transform: translateY(-3px); }

        /* Анимация появления победного экрана */
        @keyframes vicIn { 0% { transform: scale(0.6); opacity: 0; } 80% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }
        #am-vic-overlay.active .am-modal { animation: vicIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }

        /* Confetti */
        .confetti-piece {
            position: absolute;
            width: 10px; height: 10px;
            opacity: 0;
            pointer-events: none;
            z-index: 200;
            border-radius: 2px;
        }
        @keyframes confettiFall {
            0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
            100% { opacity: 0; transform: translateY(400px) rotate(720deg) scale(0.4); }
        }
    </style>

// ===================== ЗВУКИ =====================
const AudioCtx = window.AudioContext || window.webkitAudioContext;
const actx = new AudioCtx();

function playSynth(type) {
    if (actx.state === 'suspended') actx.resume();
    const t = actx.currentTime;
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.connect(gain); gain.connect(actx.destination);

    if (type === 'click') {
        osc.type = 'sine';
        osc.frequency.setValueAtTime(600, t);
        osc.frequency.exponentialRampToValueAtTime(1000, t + 0.1);
        gain.gain.setValueAtTime(0.3, t);
        gain.gain.exponentialRampToValueAtTime(0.01, t + 0.1);
        osc.start(t); osc.stop(t + 0.1);
    } else if (type === 'correct') {
        [523.25, 659.25, 783.99].forEach((freq, i) => {
            const o = actx.createOscillator(), g = actx.createGain();
            o.type = 'sine'; o.frequency.value = freq;
            o.connect(g); g.connect(actx.destination);
            g.gain.setValueAtTime(0.2, t + i * 0.05);
            g.gain.exponentialRampToValueAtTime(0.01, t + 0.5 + i * 0.05);
            o.start(t + i * 0.05); o.stop(t + 0.6 + i * 0.05);
        });
    } else if (type === 'wrong') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(300, t);
        osc.frequency.exponentialRampToValueAtTime(100, t + 0.3);
        gain.gain.setValueAtTime(0.3, t);
        gain.gain.linearRampToValueAtTime(0, t + 0.3);
        osc.start(t); osc.stop(t + 0.3);
    } else if (type === 'win') {
        [523.25, 587.33, 659.25, 783.99, 1046.50, 1318.51].forEach((freq, i) => {
            const o = actx.createOscillator(), g = actx.createGain();
            o.type = 'sine'; o.frequency.value = freq;
            o.connect(g); g.connect(actx.destination);
            g.gain.setValueAtTime(0.2, t + i * 0.1);
            g.gain.exponentialRampToValueAtTime(0.01, t + 1.0 + i * 0.1);
            o.start(t + i * 0.1); o.stop(t + 1.1 + i * 0.1);
        });
    }
}

// ===================== ЗАГРУЗКА =====================
const JSON_BASE = "https://nikashum93.github.io/texts/data/";

async function fetchWithRetry(url, retries = 20, delay = 2000) {
    const textEl = document.getElementById('loader-text');
    for (let i = 0; i < retries; i++) {
        try {
            const res = await fetch(url + "?t=" + Date.now());
            if (res.ok) return await res.json();
        } catch(e) {}
        if (i < retries - 1) {
            if (i > 1 && textEl) {
                textEl.innerHTML = `Без паники — игра публикуется.<br><span style="font-size:12px;color:#aaa;display:block;margin-top:8px;">Ждём GitHub (Попытка ${i+1} из ${retries})...</span>`;
            }
            await new Promise(r => setTimeout(r, delay));
        }
    }
    throw new Error('Файл не найден');
}

document.addEventListener("DOMContentLoaded", async () => {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const isPreview = params.get('preview');

    if (isPreview) {
        window.addEventListener('message', e => {
            if (e.data && e.data.type === 'MOVE_CFG') {
                document.getElementById('am-items').innerHTML = '';
                initAstroMove(e.data.cfg);
            }
        });
        return;
    }

    if (id) {
        document.getElementById('loader-screen').style.display = 'flex';
        try {
            const res = await fetch(`${JSON_BASE}${encodeURIComponent(id)}.json?t=` + Date.now());
            if (res.ok) {
                const cfg = await res.json();
                document.getElementById('loader-screen').style.display = 'none';
                initAstroMove(cfg);
            } else throw new Error();
        } catch(e) {
            try {
                const cfg = await fetchWithRetry(`${JSON_BASE}${encodeURIComponent(id)}.json`);
                document.getElementById('loader-screen').style.display = 'none';
                initAstroMove(cfg);
            } catch(err) {
                document.getElementById('loader-text').innerHTML = '❌ Ошибка: Файл не найден.';
                document.querySelector('.spinner').style.display = 'none';
            }
        }
    }
});

// ===================== КОНФЕТТИ =====================
function spawnConfetti(wrap, glowColor) {
    const colors = [glowColor, '#fff', '#FFD700', '#ff6b6b', '#00ffcc', '#ff00ff', '#00bfff'];
    for (let i = 0; i < 60; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = (10 + Math.random() * 80) + '%';
        el.style.top = (Math.random() * 40) + '%';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.width = (6 + Math.random() * 10) + 'px';
        el.style.height = (6 + Math.random() * 10) + 'px';
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        el.style.animationName = 'confettiFall';
        el.style.animationDuration = (0.8 + Math.random() * 1.4) + 's';
        el.style.animationDelay = (Math.random() * 0.8) + 's';
        el.style.animationTimingFunction = 'ease-in';
        el.style.animationFillMode = 'forwards';
        wrap.appendChild(el);
        setTimeout(() => el.remove(), 3000);
    }
}

// ===================== КОМБО-ПОП =====================
function spawnComboPop(wrap, combo, glowColor, x, y) {
    const el = document.createElement('div');
    el.className = 'am-combo-float';
    el.style.left = x + 'px';
    el.style.top = y + 'px';
    el.style.color = glowColor;
    el.style.textShadow = `0 0 20px ${glowColor}, 0 0 40px ${glowColor}`;

    const emojis = ['🔥','⚡','💥','✨','🌟','👑'];
    const emoji = combo >= 5 ? '👑' : combo >= 4 ? '💥' : combo >= 3 ? '⚡' : '🔥';
    el.textContent = `${emoji} x${combo}`;
    el.style.fontSize = Math.min(28 + combo * 4, 60) + 'px';
    el.style.animation = 'comboPop 1.1s ease-out forwards';
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 1200);
}

// ===================== ЗВЁЗДЫ ПОБЕДЫ =====================
function calcStars(correct, total, maxCombo) {
    const pct = correct / total;
    if (pct === 1 && maxCombo >= 3) return 3;
    if (pct >= 0.7) return 2;
    return 1;
}

function renderStars(count) {
    return '⭐'.repeat(count) + '☆'.repeat(3 - count);
}

// ===================== ФОРМАТИРОВАНИЕ ВРЕМЕНИ =====================
function fmtTime(sec) {
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    return m > 0 ? `${m}м ${s}с` : `${s}с`;
}

// ===================== ГЛАВНАЯ ФУНКЦИЯ =====================
function initAstroMove(cfg) {
    const wrap = document.getElementById('am-wrap');
    if (cfg.bg) wrap.style.backgroundImage = `url(${cfg.bg})`;

    // Шрифт
    if (cfg.font) {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = `https://fonts.googleapis.com/css2?family=${cfg.font.replace(/ /g, '+')}:wght@400;700;900&display=swap`;
        document.head.appendChild(link);
        wrap.style.fontFamily = `"${cfg.font}", sans-serif`;
    }

    // Язык
    const lang = getLang(cfg.lang || 'ru');

    // UI цвета
    const ui = cfg.ui || {};

    // Прогресс-бар
    const progBg = document.getElementById('am-prog-bg');
    const progFill = document.getElementById('am-fill');
    progBg.style.borderColor = ui.border;
    progBg.style.boxShadow = `0 0 10px ${ui.glow}40`;
    progFill.style.background = `linear-gradient(90deg, ${ui.glow}cc, ${ui.border})`;
    progFill.style.boxShadow = `0 0 12px ${ui.glow}`;

    // Звёздочки прогресса
    const starsContainer = document.getElementById('am-prog-stars');
    starsContainer.innerHTML = '';
    const totalTasks = cfg.tasks.length;
    const stepsCount = Math.min(totalTasks, 5);
    const starEls = [];
    for (let i = 0; i < stepsCount; i++) {
        const s = document.createElement('span');
        s.className = 'am-prog-star';
        s.textContent = '⭐';
        s.style.filter = `drop-shadow(0 0 5px ${ui.glow})`;
        starsContainer.appendChild(s);
        starEls.push(s);
    }

    // Надпись прогресса
    document.getElementById('am-prog-label').textContent = lang.progress;
    document.getElementById('am-prog-label').style.color = ui.glow;

    // Счёт
    document.getElementById('am-score-lbl').textContent = lang.score;
    document.getElementById('am-score-wrap').style.borderColor = ui.border;
    document.getElementById('am-score-wrap').style.boxShadow = `0 0 12px ${ui.glow}60`;
    document.getElementById('am-score-wrap').style.color = ui.text;

    // Комбо HUD
    const comboHud = document.getElementById('am-combo-hud');
    comboHud.style.color = ui.glow;
    comboHud.style.borderColor = ui.glow + '60';
    comboHud.style.textShadow = `0 0 10px ${ui.glow}`;

    // Модалки
    document.querySelectorAll('.am-modal').forEach(m => {
        m.style.background = ui.bg;
        m.style.borderColor = ui.border;
        m.style.boxShadow = `0 0 30px ${ui.glow}80`;
    });

    document.getElementById('am-q').style.color = ui.text;
    document.getElementById('am-hint').style.color = ui.glow;

    // Кнопка проверить
    const checkBtn = document.getElementById('am-check');
    checkBtn.style.borderColor = ui.border;
    checkBtn.style.color = ui.border;
    checkBtn.textContent = lang.check;

    // Победный экран
    document.getElementById('am-vic-txt').textContent = cfg.fb.text || 'YOU DID IT!';
    document.getElementById('am-vic-txt').style.color = ui.text;
    document.getElementById('am-vic-txt').style.textShadow = `0 0 20px ${ui.glow}`;
    document.getElementById('am-final-score-lbl').textContent = lang.score;
    document.getElementById('am-final-score').style.color = ui.glow;

    const retryBtn = document.getElementById('am-retry-btn');
    retryBtn.textContent = lang.retry;
    retryBtn.style.borderColor = ui.border;
    retryBtn.style.boxShadow = `0 0 15px ${ui.glow}60`;

    if (cfg.fb.pass) {
        const p = document.getElementById('am-vic-pass');
        p.style.display = 'block';
        p.textContent = `${lang.password}: ${cfg.fb.pass}`;
        p.style.borderColor = ui.border;
        p.style.color = ui.glow;
    }

    // Персонаж и предмет
    const char = document.getElementById('am-char');
    char.src = cfg.char;
    document.getElementById('am-hud-icon').src = cfg.item;

    // ---- СОСТОЯНИЕ ----
    let originalTasks = [...cfg.tasks];
    let state = {};

    function initState() {
        return {
            tasks: [...originalTasks].sort(() => Math.random() - 0.5),
            currentIdx: -1,
            score: 0,
            combo: 1,
            maxCombo: 1,
            completed: 0,
            mistakes: 0,
            totalMistakes: 0,
            correctAnswers: 0,
            startTime: Date.now(),
        };
    }

    state = initState();

    const itemsCont = document.getElementById('am-items');

    function buildItems() {
        itemsCont.innerHTML = '';
        state.tasks.forEach((task, idx) => {
            const img = document.createElement('img');
            img.src = cfg.item;
            img.className = 'am-item';
            img.style.left = (15 + Math.random() * 70) + '%';
            img.style.top = (25 + Math.random() * 65) + '%';
            img.style.filter = `drop-shadow(0 0 8px ${ui.glow})`;

            img.onclick = () => {
                playSynth('click');
                img.style.pointerEvents = 'none';
                state.currentIdx = idx;
                state.mistakes = 0;

                const wrapRect = wrap.getBoundingClientRect();
                const charRect = char.getBoundingClientRect();
                const imgRect  = img.getBoundingClientRect();

                const cX = charRect.left + charRect.width / 2 - wrapRect.left;
                const cY = charRect.top  + charRect.height / 2 - wrapRect.top;
                const tX = imgRect.left  + imgRect.width / 2  - wrapRect.left;
                const tY = imgRect.top   + imgRect.height / 2 - wrapRect.top;

                const dx = tX - cX;
                const dy = tY - cY;
                const isLeft = dx < 0;
                const angle = Math.atan2(dy, Math.abs(dx)) * 180 / Math.PI;

                char.style.transition = 'none';
                char.style.transform = `translate(-50%,-50%) scaleX(${isLeft ? -1 : 1}) rotate(${angle}deg)`;
                void char.offsetWidth;

                char.style.transition = 'left 0.8s linear, top 0.8s linear';
                char.style.left = img.style.left;
                char.style.top  = img.style.top;

                setTimeout(() => {
                    img.style.transform = 'translate(-50%,-50%) scale(0)';
                    setTimeout(() => { img.style.display = 'none'; openTask(idx); }, 200);
                }, 800);
            };
            itemsCont.appendChild(img);
        });
    }

    buildItems();

    // ---- Кнопка "Попробовать снова" ----
    retryBtn.onclick = () => {
        document.getElementById('am-vic-overlay').classList.remove('active');
        state = initState();
        document.getElementById('am-score').textContent = '0';
        comboHud.classList.remove('active');
        progFill.style.width = '0%';
        starEls.forEach(s => s.classList.remove('lit'));
        char.style.transition = 'none';
        char.style.left = '10%';
        char.style.top  = '50%';
        char.style.transform = 'translate(-50%,-50%) scaleX(1) rotate(0deg)';
        buildItems();
    };

    // ---- Открыть задание ----
    const overTask = document.getElementById('am-task-overlay');
    const content  = document.getElementById('am-task-content');
    let currentOrder = [];

    function openTask(idx) {
        const task = state.tasks[idx];
        document.getElementById('am-hint').textContent = '';
        content.innerHTML = '';
        currentOrder = [];

        document.getElementById('am-q').innerHTML = task.q;

        if (task.type === 'quiz') {
            const opts = (task.opt || task.a).split(',').map(s => s.trim()).sort(() => Math.random() - 0.5);
            opts.forEach(o => {
                const b = document.createElement('button');
                b.className = 'am-btn';
                b.innerHTML = o;
                b.style.borderColor = ui.border;
                b.style.color = ui.border;
                b.onclick = () => processAnswer(o.toLowerCase().trim() === task.a.toLowerCase().trim());
                content.appendChild(b);
            });
            checkBtn.style.display = 'none';

        } else if (task.type === 'blanks') {
            const htmlStr = task.a.replace(/\[(.*?)\]/g,
                `<input type="text" class="am-input blank-input"
                    style="border-color:${ui.border}; color:${ui.border};"
                    autocomplete="off" id="blank-input">`);
            document.getElementById('am-q').innerHTML = task.q + '<br><br>' + htmlStr;
            checkBtn.style.display = 'block';
            setTimeout(() => { const i = document.getElementById('blank-input'); if (i) i.focus(); }, 100);

        } else if (task.type === 'word_order' || task.type === 'sentence_order') {
            const items = task.type === 'word_order'
                ? task.a.trim().split(' ')
                : task.a.trim().split(/(?<=[.?!])\s+/);
            const shuffled = [...items].sort(() => Math.random() - 0.5);

            const pool   = document.createElement('div'); pool.className = 'wo-pool';
            const ansBox = document.createElement('div'); ansBox.className = 'wo-ans';
            ansBox.style.borderColor = ui.border;

            shuffled.forEach(word => {
                const chip = document.createElement('div');
                chip.className = 'wo-chip';
                chip.textContent = word;
                chip.style.borderColor = ui.border;
                chip.onclick = () => {
                    if (chip.parentElement === pool) {
                        ansBox.appendChild(chip);
                        currentOrder.push(word);
                    } else {
                        pool.appendChild(chip);
                        currentOrder = currentOrder.filter(w => w !== word);
                    }
                };
                pool.appendChild(chip);
            });
            content.appendChild(ansBox);
            content.appendChild(pool);
            checkBtn.style.display = 'block';

        } else {
            // type: 'type'
            content.innerHTML = `<input type="text" class="am-input" id="am-ans-input" autocomplete="off">`;
            const inp = document.getElementById('am-ans-input');
            inp.style.borderColor = ui.border;
            inp.style.color = ui.border;
            checkBtn.style.display = 'block';
            setTimeout(() => inp.focus(), 100);
        }

        if (window.MathJax && MathJax.typesetPromise) {
            MathJax.typesetPromise([document.getElementById('am-task-modal')]).catch(() => {});
        }
        overTask.classList.add('active');
    }

    // ---- Проверка ----
    checkBtn.onclick = () => {
        const task = state.tasks[state.currentIdx];
        if (task.type === 'word_order' || task.type === 'sentence_order') {
            const joined = currentOrder.join(' ').toLowerCase().replace(/\s+/g, '');
            const answer = task.a.toLowerCase().replace(/\s+/g, '');
            processAnswer(joined === answer);
        } else if (task.type === 'blanks') {
            const inp = document.getElementById('blank-input');
            const match = task.a.match(/\[(.*?)\]/);
            const correct = match ? match[1].toLowerCase().trim() : '';
            if (inp) processAnswer(inp.value.toLowerCase().trim() === correct);
        } else {
            const inp = document.getElementById('am-ans-input');
            if (inp) processAnswer(inp.value.trim().toLowerCase() === task.a.toLowerCase().trim());
        }
    };

    overTask.addEventListener('keypress', e => {
        if (e.key === 'Enter' && checkBtn.style.display !== 'none') checkBtn.click();
    });

    // ---- Обработка ответа ----
    function processAnswer(isCorrect) {
        const task = state.tasks[state.currentIdx];

        if (isCorrect || state.mistakes >= 3) {
            overTask.classList.remove('active');
            playSynth('correct');

            if (isCorrect) {
                const pts = 10 * state.combo;
                state.score += pts;
                state.combo++;
                state.correctAnswers++;
                if (state.combo > state.maxCombo) state.maxCombo = state.combo;

                // Комбо-поп
                if (state.combo > 2) {
                    const wrapRect = wrap.getBoundingClientRect();
                    const cx = wrapRect.width / 2;
                    const cy = wrapRect.height / 2;
                    spawnComboPop(wrap, state.combo - 1, ui.glow, cx, cy);
                }
            } else {
                state.combo = 1;
            }

            // Обновить HUD
            document.getElementById('am-score').textContent = state.score;

            if (state.combo > 2) {
                comboHud.textContent = `🔥 ${lang.combo} x${state.combo - 1}`;
                comboHud.classList.add('active');
                comboHud.style.background = `rgba(0,0,0,0.55)`;
                comboHud.style.boxShadow = `0 0 15px ${ui.glow}`;
            } else {
                comboHud.classList.remove('active');
            }

            state.completed++;

            // Прогресс-бар
            const pct = state.completed / state.tasks.length;
            progFill.style.width = (pct * 100) + '%';

            // Звёздочки прогресса
            const litCount = Math.floor(pct * stepsCount);
            starEls.forEach((s, i) => {
                if (i < litCount) s.classList.add('lit');
            });

            // Победа?
            if (state.completed >= state.tasks.length) {
                setTimeout(() => showVictory(), 900);
            }

        } else {
            // Неправильно
            playSynth('wrong');
            state.combo = 1;
            state.totalMistakes++;
            state.mistakes++;
            comboHud.classList.remove('active');

            const modal = document.getElementById('am-task-modal');
            modal.classList.remove('shake');
            void modal.offsetWidth;
            modal.classList.add('shake');

            const hint = document.getElementById('am-hint');
            if (state.mistakes === 2) {
                const hintText = task.opt
                    ? `${lang.hint}: ${task.opt}`
                    : `${lang.correct_ans}: ${task.a.replace(/\[|\]/g, '')}`;
                hint.textContent = hintText;
            }
            if (state.mistakes >= 3) {
                const ans = task.a.replace(/\[|\]/g, '');
                hint.textContent = `${lang.remember}: ${ans}`;
                const inp = document.getElementById('am-ans-input');
                if (inp) inp.value = ans;
                if (document.getElementById('blank-input')) {
                    const m = task.a.match(/\[(.*?)\]/);
                    if (m) document.getElementById('blank-input').value = m[1];
                }
            }
        }
    }

    // ---- Экран победы ----
    function showVictory() {
        const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
        const stars = calcStars(state.correctAnswers, state.tasks.length, state.maxCombo);

        document.getElementById('am-final-score').textContent = state.score;
        document.getElementById('am-vic-stars').textContent = renderStars(stars);
        document.getElementById('am-vic-stars').style.filter = `drop-shadow(0 0 8px gold)`;

        // Статистика
        const statsGrid = document.getElementById('am-vic-stats');
        statsGrid.innerHTML = '';
        const statsData = [
            { val: state.correctAnswers, lbl: lang.stat_correct },
            { val: state.totalMistakes,  lbl: lang.stat_wrong   },
            { val: `x${state.maxCombo}`, lbl: lang.stat_combo   },
            { val: fmtTime(elapsed),     lbl: lang.stat_time    },
        ];
        statsData.forEach(sd => {
            const box = document.createElement('div');
            box.className = 'vic-stat-box';
            box.style.borderColor = ui.border + '60';
            box.innerHTML = `
                <div class="vic-stat-val" style="color:${ui.glow}">${sd.val}</div>
                <div class="vic-stat-lbl" style="color:${ui.text}88">${sd.lbl}</div>`;
            statsGrid.appendChild(box);
        });

        // Персонаж улетает
        char.style.transition = 'left 1.2s ease-in, top 1.2s ease-in';
        char.style.transform = 'translate(-50%,-50%) scaleX(1) rotate(-20deg)';
        char.style.left = '120%';
        char.style.top  = '-20%';

        playSynth('win');
        spawnConfetti(wrap, ui.glow);

        document.getElementById('am-vic-overlay').classList.add('active');
    }
}
</script>
