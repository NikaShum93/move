<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Astro Move</title>
    <script>window.MathJax = { tex: { inlineMath: [['$','$'],['\\$','\\$']] }, startup: { typeset: false } };</script>
    <script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
    <style>
        * { box-sizing: border-box; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: transparent; overflow: hidden; user-select: none; }

        #loader-screen { position: fixed; inset: 0; background: rgba(20,20,25,0.4); backdrop-filter: blur(4px); z-index: 999999; display: none; flex-direction: column; justify-content: center; align-items: center; }
        .loader-box { background: rgba(10,10,15,0.85); padding: 30px; border-radius: 16px; border: 1px solid rgba(0,255,204,0.3); box-shadow: 0 10px 40px rgba(0,0,0,0.8); text-align: center; color: #fff; font-family: sans-serif; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(0,255,204,0.2); border-top-color: #00ffcc; border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .am-wrap {
            position: relative; width: 100%; height: 100%; min-height: 600px;
            background-size: cover; background-position: center; overflow: hidden;
        }

        /* ── HUD ── */
        .am-hud {
            position: absolute; top: 16px; left: 16px; right: 16px;
            display: flex; justify-content: space-between; align-items: flex-start; z-index: 10;
        }
        .am-hud-left { display: flex; align-items: center; gap: 10px; }
        .am-hud-right { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; }

        /* Иконки прогресса */
        .am-prog-icons { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; max-width: 340px; }
        .am-prog-icon {
            width: 36px; height: 36px; object-fit: contain;
            opacity: 0.25; transition: opacity 0.4s, transform 0.4s, filter 0.4s;
            filter: grayscale(1) brightness(0.5);
        }
        .am-prog-icon.lit {
            opacity: 1; filter: grayscale(0) brightness(1) drop-shadow(0 0 6px #fff);
            transform: scale(1.2);
            animation: iconLit 0.5s cubic-bezier(0.34,1.56,0.64,1);
        }
        @keyframes iconLit {
            0% { transform: scale(0.5); } 60% { transform: scale(1.4); } 100% { transform: scale(1.2); }
        }

        /* Счёт */
        .am-score-wrap {
            background: rgba(0,0,0,0.55); border: 2px solid #fff; border-radius: 30px;
            padding: 4px 16px; font-size: 20px; font-weight: 900; color: #fff;
            text-shadow: 0 0 8px #000; letter-spacing: 1px;
            box-shadow: 0 0 12px rgba(0,0,0,0.5); white-space: nowrap;
        }
        .am-score-lbl { font-size: 12px; font-weight: 400; opacity: 0.7; }

        /* Комбо HUD */
        .am-combo-hud {
            font-size: 18px; font-weight: 900; text-transform: uppercase;
            color: #fff; opacity: 0; transition: opacity 0.3s;
            background: rgba(0,0,0,0.55); border-radius: 20px;
            padding: 3px 12px; border: 2px solid rgba(255,255,255,0.3);
            white-space: nowrap;
        }
        .am-combo-hud.active { opacity: 1; animation: comboHudPulse 1.2s infinite; }
        @keyframes comboHudPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.08); } }

        /* Комбо-поп */
        .am-combo-float {
            position: absolute; pointer-events: none; font-weight: 900;
            text-transform: uppercase; color: #fff; opacity: 0; z-index: 100;
            will-change: transform, opacity; transform: translate(-50%,-50%);
        }
        @keyframes comboPop {
            0%   { opacity: 0; transform: translate(-50%,-50%) scale(0.4); }
            15%  { opacity: 1; transform: translate(-50%,-50%) scale(1.4); }
            40%  { opacity: 1; transform: translate(-50%,-50%) scale(1.0); }
            70%  { opacity: 1; transform: translate(-50%,-120%); }
            100% { opacity: 0; transform: translate(-50%,-180%); }
        }

        /* ── Предметы ── */
        .am-item {
            position: absolute; cursor: pointer;
            transform: translate(-50%,-50%); transition: transform 0.2s; z-index: 5;
        }
        .am-item:hover { transform: translate(-50%,-50%) scale(1.2); filter: brightness(1.3); }
        .am-char {
            position: absolute; width: 200px; height: 200px;
            top: 50%; left: 10%; transform: translate(-50%,-50%);
            z-index: 15; pointer-events: none;
        }

        /* ── Оверлей ── */
        .am-overlay {
            position: absolute; inset: 0;
            /* Полностью непрозрачный тёмный фон — задний план не просвечивает */
            background: rgba(0,0,0,0.92);
            display: flex; justify-content: center; align-items: center;
            opacity: 0; pointer-events: none; transition: opacity 0.35s;
            z-index: 20;
            /* Размытие только для эстетики, фон уже перекрыт */
            backdrop-filter: blur(8px);
        }
        .am-overlay.active { opacity: 1; pointer-events: auto; }

        .am-modal {
            border: 4px solid #fff; padding: 34px 44px; text-align: center;
            position: relative; min-width: 480px; max-width: 88%;
            display: flex; flex-direction: column; align-items: center; gap: 16px;
            box-shadow: 0 10px 50px rgba(0,0,0,0.9); border-radius: 18px;
        }
        .am-modal.shake {
            animation: shake 0.4s ease-in-out;
            border-color: #ff3333 !important;
            box-shadow: 0 0 30px rgba(255,0,0,0.9) !important;
        }
        @keyframes shake { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-10px)} 40%,80%{transform:translateX(10px)} }

        .am-title { font-size: 24px; font-weight: bold; margin: 0; line-height: 1.4; }
        .am-input {
            width: 100%; padding: 14px; font-size: 22px; text-align: center;
            font-weight: bold; background: rgba(0,0,0,0.6); border: 2px solid #fff;
            color: #fff; outline: none; border-radius: 8px;
        }
        .blank-input {
            width: 150px; display: inline-block; margin: 0 6px; padding: 5px 10px;
            border-radius: 6px; border-width: 2px; font-size: 19px; font-weight: bold;
            background: rgba(0,0,0,0.7); color: #fff; outline: none;
        }
        .am-btn {
            width: 100%; padding: 13px; font-size: 18px; font-weight: bold;
            background: rgba(0,0,0,0.6); color: #fff; border: 2px solid #fff;
            cursor: pointer; transition: 0.2s; text-transform: uppercase;
            border-radius: 10px; box-shadow: 0 4px 14px rgba(0,0,0,0.5);
        }
        .am-btn:hover { filter: brightness(1.3); transform: translateY(-2px); }
        .am-hint { font-size: 16px; min-height: 20px; margin: 0; font-weight: bold; }

        .wo-pool { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; min-height: 46px; }
        .wo-ans {
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center;
            min-height: 56px; border: 2px dashed rgba(255,255,255,0.45);
            padding: 12px; width: 100%; border-radius: 8px; background: rgba(0,0,0,0.35);
        }
        .wo-chip {
            background: rgba(40,40,40,0.9); border: 2px solid #fff;
            padding: 9px 14px; border-radius: 8px; cursor: pointer;
            font-size: 18px; font-weight: bold; color: #fff;
            transition: 0.15s; box-shadow: 0 3px 8px rgba(0,0,0,0.5);
            /* Звук клика навешивается через JS */
        }
        .wo-chip:hover { transform: scale(1.06); filter: brightness(1.2); }
        .wo-chip:active { transform: scale(0.96); }

        /* ── Победный экран ── */
        .vic-title { font-size: 44px; font-weight: 900; text-transform: uppercase; margin: 0; line-height: 1.1; }
        .vic-score-big { font-size: 36px; font-weight: 900; }
        .vic-stars { font-size: 34px; letter-spacing: 4px; margin: 2px 0; }
        .vic-stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; width: 100%; }
        .vic-stat-box {
            background: rgba(0,0,0,0.45); border: 2px solid rgba(255,255,255,0.15);
            border-radius: 10px; padding: 10px 12px; text-align: center;
        }
        .vic-stat-val { font-size: 24px; font-weight: 900; }
        .vic-stat-lbl { font-size: 11px; opacity: 0.65; text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
        .vic-pass {
            background: rgba(0,0,0,0.7); padding: 12px 24px;
            border: 2px dashed #fff; font-family: monospace;
            font-size: 24px; border-radius: 10px; width: 100%; text-align: center;
        }
        .vic-retry-btn {
            width: 100%; padding: 14px; font-size: 19px; font-weight: bold;
            background: rgba(0,0,0,0.6); color: #fff; border: 3px solid #fff;
            cursor: pointer; text-transform: uppercase; border-radius: 10px;
            transition: 0.2s; box-shadow: 0 6px 20px rgba(0,0,0,0.6); letter-spacing: 1px;
        }
        .vic-retry-btn:hover { filter: brightness(1.4); transform: translateY(-3px); }

        @keyframes vicIn {
            0% { transform: scale(0.6); opacity: 0; }
            80% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }
        #am-vic-overlay.active .am-modal { animation: vicIn 0.5s cubic-bezier(0.34,1.56,0.64,1) forwards; }

        /* Confetti */
        .confetti-piece {
            position: absolute; opacity: 0; pointer-events: none; z-index: 200; border-radius: 2px;
        }
        @keyframes confettiFall {
            0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
            100% { opacity: 0; transform: translateY(420px) rotate(720deg) scale(0.3); }
        }
    </style>
</head>
<body>

<div id="loader-screen">
    <div class="loader-box">
        <div class="spinner"></div>
        <div id="loader-text" style="font-weight:bold;font-size:16px;">
            Без паники — игра публикуется.<br>
            <span style="font-size:12px;color:#aaa;margin-top:8px;display:block;">Минутку... ожидаем ответ сервера</span>
        </div>
    </div>
</div>

<div class="am-wrap" id="am-wrap">
    <div class="am-hud">
        <div class="am-hud-left">
            <div class="am-prog-icons" id="am-prog-icons"></div>
        </div>
        <div class="am-hud-right">
            <div class="am-score-wrap" id="am-score-wrap">
                <span class="am-score-lbl" id="am-score-lbl">Score</span> <b id="am-score">0</b>
            </div>
            <div class="am-combo-hud" id="am-combo-hud">🔥 x2</div>
        </div>
    </div>

    <div id="am-items" style="position:absolute;inset:0;"></div>

    <!-- Задание -->

        <div class="am-modal" id="am-task-modal">
            <div class="am-title" id="am-q"></div>

            <div class="vic-score-big"><span id="am-final-score-lbl">Score</span>: <span id="am-final-score">0</span></div>

            <button class="vic-retry-btn" id="am-retry-btn">🔄 Попробовать снова</button>
        </div>
    </div>
</div>

<script>
// ── ПЕРЕВОДЫ ──
const I18N = {
    ru: { score:'Очки', combo:'Комбо', check:'Проверить', retry:'🔄 Попробовать снова', hint:'Подсказка', remember:'Запомни', correct_ans:'Правильный ответ', password:'Пароль', stat_correct:'Правильно', stat_wrong:'Ошибки', stat_combo:'Макс. Комбо', stat_time:'Время', loader_retry:(i,n)=>`Ждём GitHub (Попытка ${i} из ${n})...` },
    en: { score:'Score', combo:'Combo', check:'Check', retry:'🔄 Try Again', hint:'Hint', remember:'Remember', correct_ans:'Correct answer', password:'Password', stat_correct:'Correct', stat_wrong:'Mistakes', stat_combo:'Max Combo', stat_time:'Time', loader_retry:(i,n)=>`Waiting for GitHub (Attempt ${i} of ${n})...` },
    es: { score:'Puntos', combo:'Combo', check:'Comprobar', retry:'🔄 Intentar de nuevo', hint:'Pista', remember:'Recuerda', correct_ans:'Respuesta correcta', password:'Contraseña', stat_correct:'Correctas', stat_wrong:'Errores', stat_combo:'Combo máx.', stat_time:'Tiempo', loader_retry:(i,n)=>`Esperando GitHub (${i}/${n})...` },
    fr: { score:'Score', combo:'Combo', check:'Vérifier', retry:'🔄 Réessayer', hint:'Indice', remember:'Souviens-toi', correct_ans:'Bonne réponse', password:'Mot de passe', stat_correct:'Correctes', stat_wrong:'Erreurs', stat_combo:'Combo max.', stat_time:'Temps', loader_retry:(i,n)=>`Attente GitHub (${i}/${n})...` },
    de: { score:'Punkte', combo:'Kombo', check:'Prüfen', retry:'🔄 Nochmal', hint:'Hinweis', remember:'Merke dir', correct_ans:'Richtige Antwort', password:'Passwort', stat_correct:'Richtig', stat_wrong:'Fehler', stat_combo:'Max. Kombo', stat_time:'Zeit', loader_retry:(i,n)=>`Warte auf GitHub (${i}/${n})...` },
    it: { score:'Punteggio', combo:'Combo', check:'Controlla', retry:'🔄 Riprova', hint:'Suggerimento', remember:'Ricorda', correct_ans:'Risposta corretta', password:'Password', stat_correct:'Corrette', stat_wrong:'Errori', stat_combo:'Combo max.', stat_time:'Tempo', loader_retry:(i,n)=>`Aspetto GitHub (${i}/${n})...` },
    zh: { score:'分数', combo:'连击', check:'检查', retry:'🔄 再试一次', hint:'提示', remember:'记住', correct_ans:'正确答案', password:'密码', stat_correct:'正确', stat_wrong:'错误', stat_combo:'最大连击', stat_time:'时间', loader_retry:(i,n)=>`等待 GitHub（${i}/${n}）...` },
    ja: { score:'スコア', combo:'コンボ', check:'確認', retry:'🔄 もう一度', hint:'ヒント', remember:'覚えて', correct_ans:'正解', password:'パスワード', stat_correct:'正解数', stat_wrong:'ミス', stat_combo:'最大コンボ', stat_time:'時間', loader_retry:(i,n)=>`GitHub 待機中（${i}/${n}）...` },
};
const getLang = c => I18N[c] || I18N.en;

// ── ЗВУКИ ──
const AudioCtx = window.AudioContext || window.webkitAudioContext;
const actx = new AudioCtx();

// Реалистичный звук клика мышки
function playMouseClick() {
    if (actx.state === 'suspended') actx.resume();
    const t = actx.currentTime;
    // Буфер с белым шумом — короткий щелчок
    const bufLen = actx.sampleRate * 0.04;
    const buf = actx.createBuffer(1, bufLen, actx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) data[i] = (Math.random() * 2 - 1) * (1 - i / bufLen);
    const src = actx.createBufferSource();
    src.buffer = buf;
    const gain = actx.createGain();
    gain.gain.setValueAtTime(0.18, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.04);
    // Высокочастотный фильтр — делает звук "чётким"
    const filter = actx.createBiquadFilter();
    filter.type = 'highpass';
    filter.frequency.value = 2000;
    src.connect(filter); filter.connect(gain); gain.connect(actx.destination);
    src.start(t); src.stop(t + 0.05);
}

function playSynth(type) {
    if (actx.state === 'suspended') actx.resume();
    const t = actx.currentTime;
    if (type === 'click') {
        playMouseClick();
        return;
    }
    const osc = actx.createOscillator();
    const gain = actx.createGain();
    osc.connect(gain); gain.connect(actx.destination);
    if (type === 'correct') {
        [523.25, 659.25, 783.99].forEach((freq, i) => {
            const o = actx.createOscillator(), g = actx.createGain();
            o.type = 'sine'; o.frequency.value = freq;
            o.connect(g); g.connect(actx.destination);
            g.gain.setValueAtTime(0.2, t + i*0.05);
            g.gain.exponentialRampToValueAtTime(0.01, t + 0.5 + i*0.05);
            o.start(t + i*0.05); o.stop(t + 0.6 + i*0.05);
        });
    } else if (type === 'wrong') {
        osc.type = 'triangle';
        osc.frequency.setValueAtTime(300, t);
        osc.frequency.exponentialRampToValueAtTime(100, t + 0.3);
        gain.gain.setValueAtTime(0.3, t);
        gain.gain.linearRampToValueAtTime(0, t + 0.3);
        osc.start(t); osc.stop(t + 0.3);
    } else if (type === 'win') {
        [523.25, 587.33, 659.25, 783.99, 1046.50, 1318.51].forEach((freq, i) => {
            const o = actx.createOscillator(), g = actx.createGain();
            o.type = 'sine'; o.frequency.value = freq;
            o.connect(g); g.connect(actx.destination);
            g.gain.setValueAtTime(0.2, t + i*0.1);
            g.gain.exponentialRampToValueAtTime(0.01, t + 1.0 + i*0.1);
            o.start(t + i*0.1); o.stop(t + 1.1 + i*0.1);
        });
    }
    if (type !== 'correct') { osc.start(t); osc.stop(t + 0.4); }
}

// ── ЗАГРУЗКА ──
const JSON_BASE = "https://nikashum93.github.io/texts/data/";

async function fetchWithRetry(url, retries=20, delay=2000) {
    const textEl = document.getElementById('loader-text');
    for (let i = 0; i < retries; i++) {
        try {
            const res = await fetch(url + "?t=" + Date.now());
            if (res.ok) return await res.json();
        } catch(e) {}
        if (i < retries-1) {
            if (i > 1 && textEl) textEl.innerHTML = `Без паники — игра публикуется.<br><span style="font-size:12px;color:#aaa;display:block;margin-top:8px;">Ждём GitHub (Попытка ${i+1} из ${retries})...</span>`;
            await new Promise(r => setTimeout(r, delay));
        }
    }
    throw new Error('Файл не найден');
}

document.addEventListener("DOMContentLoaded", async () => {
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');
    const isPreview = params.get('preview');
    if (isPreview) {
        window.addEventListener('message', e => {
            if (e.data && e.data.type === 'MOVE_CFG') {
                document.getElementById('am-items').innerHTML = '';
                initAstroMove(e.data.cfg);
            }
        });
        return;
    }
    if (id) {
        document.getElementById('loader-screen').style.display = 'flex';
        try {
            const res = await fetch(`${JSON_BASE}${encodeURIComponent(id)}.json?t=` + Date.now());
            if (res.ok) { document.getElementById('loader-screen').style.display='none'; initAstroMove(await res.json()); }
            else throw new Error();
        } catch(e) {
            try {
                const cfg = await fetchWithRetry(`${JSON_BASE}${encodeURIComponent(id)}.json`);
                document.getElementById('loader-screen').style.display = 'none';
                initAstroMove(cfg);
            } catch(err) {
                document.getElementById('loader-text').innerHTML = '❌ Ошибка: Файл не найден.';
                document.querySelector('.spinner').style.display = 'none';
            }
        }
    }
});

// ── КОНФЕТТИ ──
function spawnConfetti(wrap, glowColor) {
    const colors = [glowColor,'#fff','#FFD700','#ff6b6b','#00ffcc','#ff00ff','#00bfff'];
    for (let i = 0; i < 70; i++) {
        const el = document.createElement('div');
        el.className = 'confetti-piece';
        el.style.left = (5 + Math.random() * 90) + '%';
        el.style.top = (Math.random() * 30) + '%';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.width = (6 + Math.random() * 10) + 'px';
        el.style.height = (6 + Math.random() * 10) + 'px';
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        el.style.animationName = 'confettiFall';
        el.style.animationDuration = (0.8 + Math.random() * 1.5) + 's';
        el.style.animationDelay = (Math.random() * 0.9) + 's';
        el.style.animationTimingFunction = 'ease-in';
        el.style.animationFillMode = 'forwards';
        wrap.appendChild(el);
        setTimeout(() => el.remove(), 3500);
    }
}

// ── КОМБО-ПОП ──
function spawnComboPop(wrap, combo, glowColor, x, y) {
    const el = document.createElement('div');
    el.className = 'am-combo-float';
    el.style.left = x + 'px'; el.style.top = y + 'px';
    el.style.color = glowColor;
    el.style.textShadow = `0 0 20px ${glowColor}, 0 0 50px ${glowColor}`;
    const emoji = combo >= 5 ? '👑' : combo >= 4 ? '💥' : combo >= 3 ? '⚡' : '🔥';
    el.textContent = `${emoji} x${combo}`;
    el.style.fontSize = Math.min(28 + combo*4, 64) + 'px';
    el.style.animation = 'comboPop 1.1s ease-out forwards';
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 1200);
}

// ── УТИЛИТЫ ──
function calcStars(correct, total, maxCombo) {
    const pct = correct / total;
    if (pct === 1 && maxCombo >= 3) return 3;
    if (pct >= 0.7) return 2;
    return 1;
}
function renderStars(n) { return '⭐'.repeat(n) + '☆'.repeat(3-n); }
function fmtTime(sec) {
    const m = Math.floor(sec/60), s = sec%60;
    return m > 0 ? `${m}м ${s}с` : `${s}с`;
}

// ── ГЛАВНАЯ ФУНКЦИЯ ──
function initAstroMove(cfg) {
    const wrap = document.getElementById('am-wrap');
    if (cfg.bg) wrap.style.backgroundImage = `url(${cfg.bg})`;

    if (cfg.font) {
        const link = document.createElement('link');
        link.rel = 'stylesheet';
        link.href = `https://fonts.googleapis.com/css2?family=${cfg.font.replace(/ /g,'+')}:wght@400;700;900&display=swap`;
        document.head.appendChild(link);
        wrap.style.fontFamily = `"${cfg.font}", sans-serif`;
    }

    const lang = getLang(cfg.lang || 'ru');
    const ui = cfg.ui || {};

    // Нормализуем массив предметов: item может быть строкой или массивом
    const itemUrls = Array.isArray(cfg.item)
        ? cfg.item.filter(Boolean)
        : (cfg.item ? [cfg.item] : []);
    function randomItemUrl() {
        if (!itemUrls.length) return '';
        return itemUrls[Math.floor
              char.style.transition = 'none';
         char.style.transform  = `translate(-50%,-50%) scaleX(${isLeft ? -1 : 1}) rotate(${angle}deg)`;
         void char.offsetWidth;

         char.style.transition = 'left 0.8s linear, top 0.8s linear';
         char.style.left = img.style.left;
         char.style.top  = img.style.top;

         setTimeout(() => {
             img.style.transition = 'transform 0.2s';
             img.style.transform  = 'translate(-50%,-50%) scale(0)';
             setTimeout(() => { img.style.display = 'none'; openTask(idx); }, 200);
         }, 820);
     };
     itemsCont.appendChild(img);
 });
}
buildItems();

// ── Кнопка «Попробовать снова» ──
retryBtn.onclick = () => {
document.getElementById('am-vic-overlay').classList.remove('active');
state = initState();
document.getElementById('am-score').textContent = '0';
comboHud.classList.remove('active');
iconEls.forEach(s => s.classList.remove('lit'));
char.style.transition = 'none';
char.style.left       = '10%';
char.style.top        = '50%';
char.style.transform  = 'translate(-50%,-50%) scaleX(1) rotate(0deg)';
buildItems();
};

// ── Открыть задание ──
const overTask = document.getElementById('am-task-overlay');
const content  = document.getElementById('am-task-content');
let currentOrder = [];

function styleChip(chip) {
chip.style.borderColor  = ui.border;
chip.style.color        = ui.text;
chip.style.background   = ui.bg;
chip.style.boxShadow    = 0 0 8px ${ui.glow}40;
}

function openTask(idx) {
const task = state.tasks[idx];
document.getElementById('am-hint').textContent = '';
content.innerHTML = '';
currentOrder = [];

 document.getElementById('am-q').innerHTML = task.q;

 if (task.type === 'quiz') {
     // Варианты берём из task.opt (через запятую), правильный — task.a
     const rawOpts = task.opt
         ? task.opt.split(',').map(s => s.trim())
         : [task.a.trim()];

     // Гарантируем правильный ответ в списке
     if (!rawOpts.some(o => o.toLowerCase() === task.a.toLowerCase().trim())) {
         rawOpts.push(task.a.trim());
     }
     const opts = rawOpts.sort(() => Math.random() - 0.5);

     opts.forEach(o => {
         const b = document.createElement('button');
         b.className = 'am-btn';
         b.innerHTML = o;
         b.style.borderColor = ui.border;
         b.style.color       = ui.border;
         b.onclick = () => {
             playSynth('click');
             processAnswer(o.trim().toLowerCase() === task.a.trim().toLowerCase());
         };
         content.appendChild(b);
     });
     checkBtn.style.display = 'none';

 } else if (task.type === 'blanks') {
     // Ответ формата "Текст [правильное слово] ещё текст"
     const htmlStr = task.a.replace(/$$(.*?)$$/g,
         `<input type="text" class="am-input blank-input"
             style="border-color:${ui.border};color:${ui.border};"
             autocomplete="off" spellcheck="false" id="blank-input">`);
     document.getElementById('am-q').innerHTML = task.q + '<br><br>' + htmlStr;
     checkBtn.style.display = 'block';
     setTimeout(() => { const i = document.getElementById('blank-input'); if (i) i.focus(); }, 120);

 } else if (task.type === 'word_order' || task.type === 'sentence_order') {
     const sep   = task.type === 'word_order' ? ' ' : /(?<=[.?!])\s+/;
     const items = task.type === 'word_order'
         ? task.a.trim().split(' ')
         : task.a.trim().split(/(?<=[.?!])\s+/);
     const shuffled = [...items].sort(() => Math.random() - 0.5);

     const ansBox = document.createElement('div');
     ansBox.className = 'wo-ans';
     ansBox.style.borderColor = ui.border + '80';

     const pool = document.createElement('div');
     pool.className = 'wo-pool';

     shuffled.forEach(word => {
         const chip = document.createElement('div');
         chip.className  = 'wo-chip';
         chip.textContent = word;
         styleChip(chip);

         chip.onclick = () => {
             playSynth('click');
             if (chip.parentElement === pool) {
                 ansBox.appendChild(chip);
                 currentOrder.push(word);
             } else {
                 pool.appendChild(chip);
                 // Убираем последнее вхождение этого слова
                 const idx2 = currentOrder.lastIndexOf(word);
                 if (idx2 !== -1) currentOrder.splice(idx2, 1);
             }
         };
         pool.appendChild(chip);
     });

     content.appendChild(ansBox);
     content.appendChild(pool);
     checkBtn.style.display = 'block';

 } else {
     // type === 'type'
     content.innerHTML = `<input type="text" class="am-input" id="am-ans-input"
         autocomplete="off" spellcheck="false"
         style="border-color:${ui.border};color:${ui.border};">`;
     checkBtn.style.display = 'block';
     setTimeout(() => { const i = document.getElementById('am-ans-input'); if (i) i.focus(); }, 120);
 }

 if (window.MathJax?.typesetPromise) {
     MathJax.typesetPromise([document.getElementById('am-task-modal')]).catch(() => {});
 }
 overTask.classList.add('active');
}

// ── Проверка ──
checkBtn.onclick = () => {
playSynth('click');
const task = state.tasks[state.currentIdx];

 if (task.type === 'word_order' || task.type === 'sentence_order') {
     const got    = currentOrder.join(' ').toLowerCase().replace(/\s+/g, ' ').trim();
     const answer = task.a.toLowerCase().replace(/\s+/g, ' ').trim();
     processAnswer(got === answer);

 } else if (task.type === 'blanks') {
     const inp   = document.getElementById('blank-input');
     const match = task.a.match(/$$(.*?)$$/);
     const correct = match ? match[1].toLowerCase().trim() : '';
     if (inp) processAnswer(inp.value.toLowerCase().trim() === correct);

 } else {
     const inp = document.getElementById('am-ans-input');
     if (inp) processAnswer(inp.value.trim().toLowerCase() === task.a.trim().toLowerCase());
 }
};

overTask.addEventListener('keypress', e => {
if (e.key === 'Enter' && checkBtn.style.display !== 'none') checkBtn.click();
});

// ── Обработка ответа ──
function processAnswer(isCorrect) {
const task = state.tasks[state.currentIdx];

 if (isCorrect || state.mistakes >= 3) {
     overTask.classList.remove('active');
     playSynth('correct');

     if (isCorrect) {
         const pts = 10 * state.combo;
         state.score += pts;
         state.combo++;
         state.correctAnswers++;
         if (state.combo > state.maxCombo) state.maxCombo = state.combo;

         // Комбо-поп
         if (state.combo > 2) {
             const wr  = wrap.getBoundingClientRect();
             const cx  = wr.width  * (0.4 + Math.random() * 0.2);
             const cy  = wr.height * (0.35 + Math.random() * 0.2);
             spawnComboPop(wrap, state.combo - 1, ui.glow, cx, cy);
         }

         // +очки — небольшой поп-up
         showScorePop(pts, ui.glow);
     } else {
         // Принудительное завершение после 3 ошибок — комбо сбрасывается
         state.combo = 1;
     }

     // Обновить HUD
     document.getElementById('am-score').textContent = state.score;

     // Комбо HUD
     if (state.combo > 2) {
         comboHud.textContent = `🔥 ${lang.combo} x${state.combo - 1}`;
         comboHud.classList.add('active');
         comboHud.style.boxShadow = `0 0 16px ${ui.glow}`;
     } else {
         comboHud.classList.remove('active');
     }

     state.completed++;

     // Иконки прогресса
     const litCount = Math.round((state.completed / totalTasks) * maxIcons);
     iconEls.forEach((el, i) => {
         if (i < litCount && !el.classList.contains('lit')) {
             setTimeout(() => el.classList.add('lit'), i * 60);
         }
     });

     if (state.completed >= totalTasks) {
         setTimeout(showVictory, 950);
     }

 } else {
     // Неверно
     playSynth('wrong');
     state.combo = 1;
     state.totalMistakes++;
     state.mistakes++;
     comboHud.classList.remove('active');

     const modal = document.getElementById('am-task-modal');
     modal.classList.remove('shake');
     void modal.offsetWidth;
     modal.classList.add('shake');

     const hint = document.getElementById('am-hint');
     if (state.mistakes === 2) {
         hint.textContent = task.opt && task.type !== 'quiz'
             ? `${lang.hint}: ${task.opt}`
             : `${lang.correct_ans}: ${task.a.replace(/\[|\]/g, '')}`;
     }
     if (state.mistakes >= 3) {
         const ans = task.a.replace(/$$|$$/g, '');
         hint.textContent = `${lang.remember}: ${ans}`;
         const inp = document.getElementById('am-ans-input');
         if (inp) inp.value = ans;
         if (document.getElementById('blank-input')) {
             const m = task.a.match(/$$(.*?)$$/);
             if (m) document.getElementById('blank-input').value = m[1];
         }
     }
 }
}

// ── +очки поп-ап ──
function showScorePop(pts, color) {
const el = document.createElement('div');
el.textContent = +${pts};
el.style.cssText =          position:absolute; pointer-events:none; z-index:150;          font-size:28px; font-weight:900; color:${color};          text-shadow:0 0 12px ${color};          left:${50 + (Math.random()*20-10)}%; top:${40 + (Math.random()*20-10)}%;          transform:translate(-50%,-50%);          animation:comboPop 0.9s ease-out forwards;     ;
wrap.appendChild(el);
setTimeout(() => el.remove(), 950);
}

// ── Экран победы ──
function showVictory() {
const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
const stars   = calcStars(state.correctAnswers, totalTasks, state.maxCombo);

 document.getElementById('am-final-score').textContent = state.score;
 document.getElementById('am-vic-stars').textContent   = renderStars(stars);
 document.getElementById('am-vic-stars').style.filter  = 'drop-shadow(0 0 10px gold)';

 // Статистика
 const statsGrid = document.getElementById('am-vic-stats');
 statsGrid.innerHTML = '';
 [
     { val: state.correctAnswers,                 lbl: lang.stat_correct },
     { val: state.totalMistakes,                  lbl: lang.stat_wrong   },
     { val: `x${state.maxCombo}`,                 lbl: lang.stat_combo   },
     { val: fmtTime(elapsed),                     lbl: lang.stat_time    },
 ].forEach(sd => {
     const box = document.createElement('div');
     box.className = 'vic-stat-box';
     box.style.borderColor = ui.border + '55';
     box.innerHTML = `
         <div class="vic-stat-val" style="color:${ui.glow}">${sd.val}</div>
         <div class="vic-stat-lbl" style="color:${ui.text}99">${sd.lbl}</div>`;
     statsGrid.appendChild(box);
 });

 // Персонаж улетает по диагонали вверх
 char.style.transition = 'left 1.2s ease-in, top 1.2s ease-in, transform 1.2s ease-in';
 char.style.left       = '120%';
 char.style.top        = '-20%';
 char.style.transform  = 'translate(-50%,-50%) scaleX(1) rotate(-25deg) scale(1.4)';

 playSynth('win');
 spawnConfetti(wrap, ui.glow);

 document.getElementById('am-vic-overlay').classList.add('active');
}
}
// ── КОНЕЦ СКРИПТА ──
</script>
</body>
